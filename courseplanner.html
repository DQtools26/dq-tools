// ── EVENTS ────────────────────────────────
function attachEvents(step) {
  if (step===1) {
    document.querySelectorAll('input[name="sg"]').forEach(r => {
      r.addEventListener('change', () => {
        const sec = document.getElementById('prior-section');
        if (sec) sec.style.display = parseInt(r.value)>9?'':'none';
      });
    });
    document.querySelectorAll('input[name="m8"]').forEach(r => {
      r.addEventListener('change', () => {
        const note = document.getElementById('m8note');
        if (!note) return;
        const v = r.value;
        note.style.display = (v==='alg1'||v==='geo') ? 'block' : 'none';
        note.textContent = v==='geo'
          ? '🎉🎉 Geometry in 8th grade unlocks Algebra II (and Algebra II Honors with teacher rec) for 9th grade!'
          : '🎉 Algebra I in 8th grade unlocks Geometry (and Geometry Honors with teacher rec) for 9th grade!';
      });
    });
  }
}

// ── ELECTIVE SEARCH ───────────────────────────────────────────
function filterElecs(inputId, grade) {
  const q = (document.getElementById(inputId)?.value || '').toLowerCase().trim();
  const resultsEl = document.getElementById('elec-sr-' + grade);
  if (!resultsEl) return;
  if (!q) { resultsEl.innerHTML = ''; return; }
  const elecSubjects = ['Arts','PE','FL','FCS','JROTC','MATC','Alt'];
  const matches = COURSES.filter(c =>
    elecSubjects.includes(c.subject) &&
    c.grade.includes(grade) &&
    c.name.toLowerCase().includes(q)
  ).slice(0, 15);
  if (!matches.length) {
    resultsEl.innerHTML = '<div style="padding:8px 4px;font-size:.8rem;color:var(--text3)">No matches</div>';
    return;
  }
  resultsEl.innerHTML = '<div style="font-size:.62rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:4px">Search results</div>' +
    '<div class="copts">' + matches.map(c => courseOptHTML(c, grade)).join('') + '</div>';
}

// ── PLAN GRID: CREDIT CYCLER ──────────────────────────────────
function pgCycleCredit(id, grade) {
  const c = courseMap[id];
  if (!c || !c.isVar) return;
  const [mn, mx] = c.credits;
  const cur = getChosenCredits(grade, id);
  const vals = [];
  for (let v = mn; v <= mx; v = Math.round((v + mn) * 10) / 10) vals.push(v);
  if (!vals.includes(mx)) vals.push(mx);
  const idx = vals.indexOf(cur);
  const next = vals[(idx + 1) % vals.length];
  setChoice(grade, id, next);
  updateNavCred();
  renderPlanGrid();
}

// ── PLAN GRID: DROPDOWN SEARCH ────────────────────────────────
function pgFilterDrop(grade, rowId, query) {
  const q = query.toLowerCase().trim();
  const listEl = document.getElementById('pgdrop-list');
  if (!listEl) return;
  const subjectMap = {
    la:['LA'], ss:['SS'], math:['Math'], sci:['Sci'],
    elec:['Arts','PE','FL','FCS','JROTC','MATC','Alt']
  };
  const subjects = subjectMap[rowId] || [];
  const pool = COURSES.filter(c =>
    subjects.includes(c.subject) &&
    c.grade.includes(grade) &&
    getChosenCredits(grade, c.id) === 0 &&
    (q ? c.name.toLowerCase().includes(q) : true)
  );
  listEl.innerHTML = pool.slice(0, 20).map(c => {
    const cr = c.isVar ? c.credits[0] + '-' + c.credits[1] : c.credits;
    const avail = canTake(c.id, grade);
    const lock = avail ? '' : ` title="${getLockReason(c.id, grade)}"`;
    return `<div class="pgdi${avail ? '' : ' pglocked'}"${lock}${avail ? ` onclick="pgAdd('${c.id}',${grade})"` : ''}>
      ${c.name} <span style="opacity:.5;font-size:.7rem">${cr}cr${avail ? '' : ' 🔒'}</span>
    </div>`;
  }).join('') || '<div class="pgdi" style="color:var(--text3);cursor:default">No matches</div>';
}

// ── REQUIREMENTS OVERLAY ──────────────────────────────────────
let reqsOpen = false;

function toggleReqsView() {
  reqsOpen = !reqsOpen;
  if (reqsOpen) {
    if (planOpen) { planOpen = false; document.getElementById('plan-overlay').classList.remove('open'); document.getElementById('nav-plan-btn').classList.remove('active'); }
    if (pathsOpen) { pathsOpen = false; document.getElementById('paths-overlay').classList.remove('open'); document.getElementById('nav-paths-btn').classList.remove('active'); }
  }
  const overlay = document.getElementById('reqs-overlay');
  const btn = document.getElementById('nav-reqs-btn');
  if (!overlay || !btn) return;
  if (reqsOpen) { overlay.classList.add('open'); btn.classList.add('active'); renderReqsPage(); }
  else { overlay.classList.remove('open'); btn.classList.remove('active'); }
}

function renderReqsPage(searchQuery) {
  const overlay = document.getElementById('reqs-overlay');
  if (!overlay) return;
  const q = (searchQuery || '').toLowerCase().trim();

  const REQS = [
    {key:'la',       label:'Language Arts',    icon:'📘', needed:4,   get:()=>getReqCredits('la'),          note:'4 credits required — LA I through senior year'},
    {key:'ss',       label:'Social Studies',   icon:'📗', needed:3,   get:()=>getReqCredits('ss'),          note:'World History (9), US History (10), Government (11/12)'},
    {key:'math',     label:'Mathematics',      icon:'📐', needed:3,   get:()=>getReqCredits('math'),        note:'At least Algebra I, Geometry, Algebra II sequence'},
    {key:'sci',      label:'Science',          icon:'🔬', needed:3,   get:()=>getReqCredits('sci'),         note:'Physical Science + Biology I + one more science'},
    {key:'arts',     label:'Fine Arts',        icon:'🎨', needed:1,   get:()=>getReqCredits('arts'),        note:'Art, Music, Theatre — JROTC Drill counts as ½ Fine Arts'},
    {key:'pe',       label:'Physical Ed',      icon:'🏃', needed:1,   get:()=>getEffectivePECredits(),      note:'PE, Conditioning, Aerobics, Lifetime Sport or Team Sports'},
    {key:'health',   label:'Health',           icon:'💊', needed:0.5, get:()=>getEffectiveHealthCredits(),  note:'Health & Family Ed (½ cr) — LET 2 earns ½ Health credit'},
    {key:'practical',label:'Practical Arts',   icon:'🏭', needed:1,   get:()=>getReqCredits('practical'),   note:'CTE, Business, FCS, many MATC programs count'},
    {key:'finance',  label:'Personal Finance', icon:'💼', needed:0.5, get:()=>getReqCredits('finance'),     note:'Personal Finance is ½ credit required for graduation'},
  ];

  const total = getTotalCredits();
  const totalMet = total >= 24;
  const pct = Math.min(100, Math.round(total / 24 * 100));

  const catsHtml = REQS.map(r => {
    const have = r.get();
    const met = have >= r.needed;
    const part = have > 0 && !met;
    const dotCls = met ? 'met' : part ? 'part' : 'unmet';
    const progCls = met ? 'met' : part ? 'part' : 'unmet';
    const still = Math.max(0, r.needed - have).toFixed(1).replace('.0','');

    // Courses already selected for this req
    const selected = COURSES.filter(c => c.req === r.key && isChecked(c.id));
    // Courses available to add
    const available = COURSES.filter(c =>
      c.req === r.key &&
      !isChecked(c.id) &&
      (q ? c.name.toLowerCase().includes(q) : true) &&
      c.grade.some(g => canTake(c.id, g))
    );
    // Locked courses for this req
    const locked = COURSES.filter(c =>
      c.req === r.key &&
      !isChecked(c.id) &&
      !c.grade.some(g => canTake(c.id, g)) &&
      (q ? c.name.toLowerCase().includes(q) : true)
    );

    const selHtml = selected.map(c => {
      const g = [9,10,11,12].find(g => getChosenCredits(g,c.id)>0) || c.grade[0];
      const cr = getChosenCredits(g,c.id);
      return `<div class="req-course-row selected">
        <div class="rcr-name">✓ ${c.name}</div>
        <div class="rcr-grade">Grade ${g}</div>
        <div class="rcr-done">+${cr} cr</div>
      </div>`;
    }).join('');

    const avHtml = available.slice(0,8).map(c => {
      const g = c.grade.find(g => canTake(c.id,g)) || c.grade[0];
      const cr = c.isVar ? `${c.credits[0]}–${c.credits[1]}` : c.credits;
      const isRig = c.tags.includes('rigorous') ? ' <span style="font-size:.62rem;color:var(--amber)">★ Rigorous</span>' : '';
      return `<div class="req-course-row" onclick="reqAdd('${c.id}',${g})">
        <div class="rcr-name">${c.name}${isRig}</div>
        <div class="rcr-grade">Grade ${g}</div>
        <div class="rcr-cr">+ ${cr} cr</div>
      </div>`;
    }).join('');

    const lockHtml = locked.slice(0,3).map(c => {
      const reason = getLockReason(c.id, c.grade[0]);
      return `<div class="req-course-row" style="opacity:.45;cursor:default">
        <div class="rcr-name">🔒 ${c.name}</div>
        <div class="rcr-lock" style="flex:1">${reason.slice(0,60)}${reason.length>60?'…':''}</div>
      </div>`;
    }).join('');

    return `<div class="req-cat">
      <div class="req-cat-head">
        <div class="req-dot ${dotCls}"></div>
        <div class="req-cat-label">${r.icon} ${r.label}</div>
        <div class="req-cat-prog ${progCls}">${have}/${r.needed} cr${met?' ✓':` — need ${still} more`}</div>
      </div>
      <div class="req-body">
        <div class="req-note">${r.note}</div>
        ${selHtml}
        ${!met && available.length ? `<div class="req-add-label">Click to add to your plan:</div>${avHtml}` : ''}
        ${!met && available.length > 8 ? `<div class="req-note">+${available.length-8} more available courses</div>` : ''}
        ${lockHtml}
        ${met ? '<div style="font-size:.78rem;color:var(--green);padding:6px 8px">✅ Requirement fulfilled!</div>' : ''}
      </div>
    </div>`;
  }).join('');

  overlay.innerHTML = `<div class="reqs-wrap">
    <div class="paths-title">✅ Graduation Requirements</div>
    <div class="paths-sub">24 credits minimum · 28 maximum · Click any course to add it to your plan</div>

    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
        <div style="font-size:1.5rem;font-weight:900;color:${totalMet?'var(--green)':'var(--amber)'}">${total}<span style="font-size:.9rem;font-weight:400;color:var(--text3)">/24</span></div>
        <div style="flex:1">
          <div style="height:7px;background:var(--surface3);border-radius:4px;overflow:hidden">
            <div style="height:100%;width:${pct}%;background:${totalMet?'var(--green)':'var(--blue2)'};border-radius:4px;transition:width .5s"></div>
          </div>
          <div style="font-size:.7rem;color:var(--text3);margin-top:3px">credits planned · ${totalMet?'Meets graduation minimum ✅':'Need '+(24-total)+' more to graduate'}</div>
        </div>
      </div>
    </div>

    <input class="req-search" placeholder="🔍 Search courses to add…" oninput="renderReqsPage(this.value)" />

    ${catsHtml}

    <div style="text-align:center;margin-top:20px">
      <button class="btn btn-ghost" onclick="toggleReqsView()">← Back</button>
    </div>
  </div>`;
}

function reqAdd(id, grade) {
  const c = courseMap[id];
  if (!c) return;
  const cr = c.isVar ? c.credits[0] : c.credits;
  setChoice(grade, id, cr);
  updateNavCred();
  renderReqsPage();
}
