<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="../favicon.png">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TNYF9DN593"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-TNYF9DN593');</script>
  <script>(function(){var t=localStorage.getItem('dqt_theme')||'dark';if(t!=='dark')document.documentElement.setAttribute('data-theme',t);})();</script>
  <script src="../dq-auth.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <title>Multiplayer — DQtrivia</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--bg:#0b0c10;--bg2:#13141a;--bg3:#1a1b23;--border:rgba(255,255,255,0.08);--border-hi:rgba(255,255,255,0.15);--text:#f0f0f4;--muted:#7b7c8a;--accent:#4de888;--blue:#3a7fff;--gold:#f5c842;--red:#ff6b6b;--font-d:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;}
    [data-theme="ocean"]   {--bg:#040e1c;--bg2:#071629;--bg3:#0a1e38;--accent:#3ae8ff;--border:rgba(58,232,255,0.1);}
    [data-theme="forest"]  {--bg:#030e05;--bg2:#061809;--bg3:#09210d;--border:rgba(77,232,136,0.1);}
    [data-theme="sunset"]  {--bg:#12060a;--bg2:#1e0b10;--bg3:#2a1018;--accent:#ff8c5a;--blue:#ff5a8c;--border:rgba(255,140,90,0.1);}
    [data-theme="midnight"]{--bg:#05050f;--bg2:#09091e;--bg3:#0e0e2d;--accent:#a78bfa;--blue:#818cf8;--border:rgba(167,139,250,0.1);}
    [data-theme="candy"]   {--bg:#100514;--bg2:#1c0924;--bg3:#260e30;--accent:#f472b6;--blue:#c084fc;--border:rgba(244,114,182,0.1);}
    [data-theme="neon"]    {--bg:#020208;--bg2:#050510;--bg3:#080818;--accent:#39ff14;--blue:#00f5ff;--border:rgba(57,255,20,0.12);}
    [data-theme="metro"]   {--bg:#0d0d14;--bg2:#141420;--bg3:#1b1b2c;--accent:#60a5fa;--blue:#3b82f6;--border:rgba(96,165,250,0.1);}
    body{background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:15px;line-height:1.6;min-height:100vh;overflow-x:hidden;}
    .blob{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0;}
    .b1{width:500px;height:500px;background:rgba(58,127,255,0.06);top:-100px;right:-100px;}
    .b2{width:400px;height:400px;background:rgba(77,232,136,0.05);bottom:0;left:-80px;}
    nav{position:sticky;top:0;z-index:100;background:rgba(11,12,16,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;gap:12px;}
    .nav-logo{font-family:var(--font-d);font-weight:800;font-size:1.05rem;letter-spacing:-0.02em;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:8px;flex-shrink:0;}
    .nav-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);}
    .nav-links{display:flex;align-items:center;gap:2px;}
    .nav-links a{font-size:0.77rem;font-weight:500;color:var(--muted);text-decoration:none;padding:5px 9px;border-radius:6px;transition:color .15s,background .15s;white-space:nowrap;}
    .nav-links a:hover{color:var(--text);background:rgba(255,255,255,0.06);}
    .nav-links a.active{color:var(--accent);}
    .nav-hamburger{display:none;flex-direction:column;gap:4px;background:none;border:none;cursor:pointer;padding:6px;}
    .nav-hamburger span{display:block;width:18px;height:2px;background:var(--muted);border-radius:2px;}
    @media(max-width:640px){.nav-links{display:none;}.nav-links.open{display:flex;flex-direction:column;align-items:flex-start;position:fixed;top:56px;left:0;right:0;background:rgba(11,12,16,0.98);border-bottom:1px solid var(--border);padding:12px 20px 16px;gap:4px;z-index:99;}.nav-hamburger{display:flex;}}
    .nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0;}
    #dq-auth-btn{display:flex;align-items:center;gap:6px;background:rgba(14,19,32,0.8);border:1px solid #2a4468;border-radius:100px;padding:4px 10px 4px 5px;font-family:var(--font-b);font-size:.68rem;font-weight:500;color:#7a9abf;cursor:pointer;transition:all .18s;white-space:nowrap;flex-shrink:0;}
    #dq-auth-btn:hover{border-color:#3a7fff;color:#e8eef8;}
    #dq-auth-btn.logged-in{border-color:rgba(77,232,136,.35);color:#e8eef8;}
    #dq-auth-avatar{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#2dcc6f,#3a7fff);display:flex;align-items:center;justify-content:center;font-size:.75rem;overflow:hidden;flex-shrink:0;}
    #dq-auth-avatar img{width:100%;height:100%;object-fit:cover;}
    main{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:28px 20px 100px;}

    /* TABS */
    .tabs{display:flex;gap:6px;margin-bottom:22px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:5px;}
    .tab{flex:1;padding:9px 6px;border-radius:9px;border:none;background:transparent;color:var(--muted);font-family:var(--font-b);font-size:0.8rem;font-weight:600;cursor:pointer;transition:all .18s;text-align:center;line-height:1.3;}
    .tab:hover{color:var(--text);}
    .tab.on{background:var(--bg3);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.3);}
    .tab .ti{display:block;font-size:1.1rem;margin-bottom:2px;}
    .tab .tn{display:block;font-size:0.72rem;font-weight:700;}
    .tab .td{display:block;font-size:0.6rem;color:var(--muted);margin-top:1px;}
    .tab.on .td{color:var(--muted);}

    /* PANELS */
    .panel{display:none;animation:fadeUp .2s ease both;}
    .panel.on{display:block;}

    /* CARD */
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px 22px;}
    .card-title{font-family:var(--font-d);font-size:1rem;font-weight:800;margin-bottom:4px;}
    .card-sub{font-size:0.76rem;color:var(--muted);margin-bottom:16px;line-height:1.45;}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    @media(max-width:640px){.two-col{grid-template-columns:1fr;}}

    /* FIELDS */
    .fl{margin-bottom:11px;}
    .fl label{display:block;font-size:0.66rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
    .fi{background:var(--bg3);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:var(--font-b);font-size:0.88rem;padding:9px 12px;outline:none;transition:border-color .15s;width:100%;}
    .fi:focus{border-color:var(--accent);}
    .fi::placeholder{color:var(--muted);}
    select.fi{cursor:pointer;}
    .cr{display:flex;gap:5px;flex-wrap:wrap;margin-top:3px;}
    .ch{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:4px 11px;font-size:0.73rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;user-select:none;}
    .ch:hover{border-color:var(--border-hi);color:var(--text);}
    .ch.on{background:rgba(77,232,136,0.1);border-color:rgba(77,232,136,0.4);color:var(--accent);}

    /* BUTTONS */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:10px;font-family:var(--font-b);font-size:0.85rem;font-weight:700;cursor:pointer;transition:all .15s;border:none;padding:10px 16px;width:100%;}
    .btn+.btn{margin-top:6px;}
    .btn:active:not(:disabled){transform:scale(0.97);}
    .btn:disabled{opacity:0.4;cursor:not-allowed;}
    .btn-g{background:var(--accent);color:#071209;}
    .btn-g:hover:not(:disabled){filter:brightness(1.08);}
    .btn-b{background:var(--blue);color:#fff;}
    .btn-b:hover:not(:disabled){filter:brightness(1.08);}
    .btn-gh{background:rgba(255,255,255,0.05);color:var(--text);border:1px solid var(--border);}
    .btn-gh:hover:not(:disabled){background:rgba(255,255,255,0.08);}
    .btn-red{background:var(--red);color:#fff;}

    /* JOIN PANEL */
    .join-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;}
    .join-title{font-family:var(--font-d);font-size:1.2rem;font-weight:800;margin-bottom:4px;}
    .join-sub{font-size:0.78rem;color:var(--muted);margin-bottom:18px;line-height:1.45;}
    .code-inp{background:var(--bg3);border:1.5px solid var(--border);border-radius:11px;color:var(--text);font-family:var(--font-d);font-size:1.6rem;font-weight:800;letter-spacing:.22em;padding:12px 14px;outline:none;transition:border-color .2s;width:100%;text-align:center;text-transform:uppercase;}
    .code-inp:focus{border-color:var(--accent);}
    .code-inp::placeholder{color:var(--muted);font-size:1rem;letter-spacing:.05em;font-family:var(--font-b);font-weight:400;}
    .name-inp{background:var(--bg3);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:var(--font-b);font-size:0.9rem;padding:10px 13px;outline:none;transition:border-color .15s;width:100%;margin-top:9px;}
    .name-inp:focus{border-color:var(--accent);}
    .name-inp::placeholder{color:var(--muted);}

    /* HOW IT WORKS */
    .how-list{display:flex;flex-direction:column;gap:10px;}
    .how-step{display:flex;gap:10px;align-items:flex-start;}
    .how-n{width:20px;height:20px;border-radius:50%;background:rgba(77,232,136,0.12);border:1px solid rgba(77,232,136,0.3);display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:700;color:var(--accent);flex-shrink:0;margin-top:2px;}
    .how-t{font-size:0.77rem;color:var(--muted);line-height:1.45;}

    /* LOBBY */
    .lobby-wrap{display:grid;grid-template-columns:1fr 250px;gap:14px;align-items:start;}
    @media(max-width:680px){.lobby-wrap{grid-template-columns:1fr;}}
    .lobby-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px;}
    .code-block{text-align:center;padding-bottom:16px;margin-bottom:16px;border-bottom:1px solid var(--border);}
    .code-label{font-size:0.61rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
    .code-big{font-family:var(--font-d);font-size:clamp(1.8rem,6vw,2.8rem);font-weight:800;letter-spacing:.28em;color:var(--accent);cursor:pointer;transition:opacity .15s;line-height:1;}
    .code-big:hover{opacity:0.7;}
    .code-hint{font-size:0.65rem;color:var(--muted);margin-top:5px;}
    .qr-box{margin-top:10px;display:flex;justify-content:center;}
    .qr-box canvas,.qr-box img{border-radius:7px!important;background:#fff;padding:5px;}
    .meta-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
    .mpill{background:var(--bg3);border:1px solid var(--border);border-radius:100px;padding:3px 9px;font-size:0.66rem;color:var(--muted);}
    .mpill strong{color:var(--text);}
    .sbadge{display:inline-flex;align-items:center;gap:5px;border-radius:100px;padding:3px 11px;font-size:0.66rem;font-weight:600;margin-bottom:12px;}
    .sbadge .dot{width:5px;height:5px;border-radius:50%;}
    .sw{background:rgba(245,200,66,0.08);color:var(--gold);border:1px solid rgba(245,200,66,0.18);}
    .sw .dot{background:var(--gold);animation:blink 1s infinite;}
    .sg{background:rgba(77,232,136,0.08);color:var(--accent);border:1px solid rgba(77,232,136,0.18);}
    .sg .dot{background:var(--accent);}
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}
    .hact{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px;}
    .hact .btn{width:auto;}
    .sync-ind{width:7px;height:7px;border-radius:50%;background:var(--accent);display:inline-block;margin-left:8px;animation:blink .9s infinite;vertical-align:middle;}
    .sync-ind.dead{background:var(--red);animation:none;}

    /* PLAYERS */
    .pp{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:15px;}
    .pp-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
    .pp-ttl{font-family:var(--font-d);font-size:0.84rem;font-weight:700;}
    .pp-cnt{background:var(--accent);color:#071209;border-radius:100px;padding:2px 8px;font-size:0.64rem;font-weight:800;}
    .pl{display:flex;flex-direction:column;gap:4px;}
    .pr{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 10px;}
    .pr.ph{border-color:rgba(245,200,66,0.18);background:rgba(245,200,66,0.02);}
    .pr.pm{border-color:rgba(77,232,136,0.15);}
    .pav{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.66rem;font-weight:700;flex-shrink:0;}
    .pnm{font-size:0.78rem;font-weight:500;flex:1;}
    .ptg{font-size:0.56rem;border-radius:100px;padding:2px 6px;border:1px solid;flex-shrink:0;}
    .ptg-h{color:var(--gold);border-color:rgba(245,200,66,0.28);}
    .ptg-y{color:var(--accent);border-color:rgba(77,232,136,0.28);}
    .pempty{text-align:center;padding:14px;color:var(--muted);font-size:0.73rem;}

    /* WARMUP */
    .wu{margin-top:13px;border-top:1px solid var(--border);padding-top:13px;}
    .wu-lbl{font-size:0.6rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
    .wu-q{font-size:0.78rem;font-weight:600;margin-bottom:6px;line-height:1.4;}
    .wu-opts{display:flex;flex-direction:column;gap:3px;}
    .wu-btn{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:5px 10px;font-size:0.72rem;color:var(--text);cursor:pointer;text-align:left;transition:all .15s;font-family:var(--font-b);}
    .wu-btn:hover:not(:disabled){border-color:var(--border-hi);}
    .wu-btn.c{background:rgba(77,232,136,0.1);border-color:rgba(77,232,136,0.38);color:var(--accent);}
    .wu-btn.w{background:rgba(255,107,107,0.07);border-color:rgba(255,107,107,0.28);color:var(--red);}
    .wu-btn.r{background:rgba(77,232,136,0.04);border-color:rgba(77,232,136,0.1);color:var(--muted);}

    /* SPINNER */
    .spinwrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:40vh;gap:12px;}
    .spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

    /* TOAST */
    .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8px 18px;font-size:0.8rem;color:var(--text);opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:300;white-space:nowrap;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    .dq-watermark{position:fixed;bottom:8px;left:12px;font-family:var(--font-d);font-size:.57rem;font-weight:600;letter-spacing:.1em;color:#1a5c36;text-transform:uppercase;pointer-events:none;z-index:998;}
    .fab2-wrap{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;align-items:flex-end;gap:8px;z-index:999;}
    .fab2-toggle{width:34px;height:34px;border-radius:50%;background:#28a45a;border:none;color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(40,164,90,0.4);transition:transform .18s,background .18s;}
    .fab2-toggle.open{transform:rotate(45deg);background:#1f8a48;}
    .fab2-items{display:flex;flex-direction:column;align-items:flex-end;gap:7px;overflow:hidden;max-height:0;opacity:0;transition:max-height .32s ease,opacity .25s ease;}
    .fab2-items.open{max-height:400px;opacity:1;}
    .fab2-item{display:flex;align-items:center;position:relative;}
    .fab2-label{background:#18181f;color:#c8f0d8;font-size:.62rem;font-weight:700;padding:4px 8px;border-radius:6px;white-space:nowrap;border:1px solid #2e2e42;opacity:0;transform:translateX(6px);transition:opacity .15s,transform .15s;pointer-events:none;margin-right:7px;}
    .fab2-item:hover .fab2-label{opacity:1;transform:translateX(0);}
    .fab2-icon{width:30px;height:30px;border-radius:50%;background:#28a45a;color:#fff;display:flex;align-items:center;justify-content:center;font-size:.78rem;text-decoration:none;transition:background .15s,transform .15s;}
    .fab2-icon:hover{background:#1f8a48;transform:scale(1.12);}
  </style>
</head>
<body>
<div class="blob b1"></div><div class="blob b2"></div>
<div class="toast" id="toast"></div>
<nav>
  <a class="nav-logo" href="index.html"><div class="nav-dot"></div>DQtrivia</a>
  <button class="nav-hamburger" id="hamburger" onclick="toggleNav()"><span></span><span></span><span></span></button>
  <div class="nav-links" id="navLinks">
    <a href="index.html">Home</a><a href="categories.html">Categories</a><a href="play.html">Play</a>
    <a href="stats.html">Stats</a><a href="history.html">History</a><a href="shop.html">🛒 Shop</a>
    <a href="settings.html">⚙️</a>
    <a href="lobby.html" class="active" style="background:var(--blue);color:#fff;border-radius:7px;padding:5px 10px;font-weight:700;font-size:0.75rem;">Multiplayer</a>
  </div>
  <div class="nav-right">
    <span id="navBadge" style="font-size:0.95rem;flex-shrink:0;"></span>
    <button id="dq-auth-btn" onclick="(function(e){e.stopPropagation();if(typeof DQAuth!=='undefined')DQAuth._toggleDropdown();})(event)">
      <div id="dq-auth-avatar">👤</div><span id="dq-auth-label">Sign In</span>
    </button>
  </div>
</nav>
<main id="mainContent"><div class="spinwrap"><div class="spinner"></div></div></main>
<div class="dq-watermark">© 2026 DQtools by E. S.</div>
<div class="fab2-wrap">
  <div class="fab2-items" id="fab2menu">
    <div class="fab2-item"><span class="fab2-label">Settings</span><a class="fab2-icon" href="settings.html">⚙️</a></div>
    <div class="fab2-item"><span class="fab2-label">Shop</span><a class="fab2-icon" href="shop.html">🛒</a></div>
    <div class="fab2-item"><span class="fab2-label">Stats</span><a class="fab2-icon" href="stats.html">📊</a></div>
    <div class="fab2-item"><span class="fab2-label">Account</span><a class="fab2-icon" href="account.html">👤</a></div>
    <div class="fab2-item"><span class="fab2-label">DQtools Home</span><a class="fab2-icon" href="../index.html">🏠</a></div>
  </div>
  <button class="fab2-toggle" id="fab2btn" onclick="(function(){var m=document.getElementById('fab2menu'),b=document.getElementById('fab2btn');m.classList.toggle('open');b.classList.toggle('open');b.textContent=b.classList.contains('open')?'✕':'☰';})()">☰</button>
</div>
<script>
// ── CONSTANTS ──
var COLORS=['#4de888','#3a7fff','#f5c842','#ff8c5a','#a78bfa','#f472b6','#3ae8ff'];
var BADGES={rookie:'🥉',scholar:'📖',champion:'🏆',legend:'🐉',ghost:'👻',wizard:'🧙'};
var CAT_NAMES={0:'All Categories',9:'General Knowledge',10:'Books',11:'Film',12:'Music',13:'Musicals & Theatre',14:'Television',15:'Video Games',16:'Board Games',17:'Science & Nature',18:'Computers',19:'Mathematics',20:'Mythology',21:'Sports',22:'Geography',23:'History',24:'Politics',25:'Art',26:'Celebrities',27:'Animals',28:'Vehicles',29:'Comics',30:'Gadgets',31:'Anime & Manga',32:'Cartoons & Animation'};
var WU=[
  {q:'Capital of France?',a:'Paris',o:['London','Paris','Berlin','Madrid']},
  {q:'Sides on a hexagon?',a:'6',o:['5','6','7','8']},
  {q:'Closest planet to the Sun?',a:'Mercury',o:['Venus','Earth','Mars','Mercury']},
  {q:'Who wrote Romeo and Juliet?',a:'Shakespeare',o:['Dickens','Shakespeare','Austen','Poe']},
  {q:'12 x 12?',a:'144',o:['124','132','144','148']},

  {q:'Largest ocean?',a:'Pacific',o:['Atlantic','Indian','Pacific','Arctic']},

function chips(id,vals,cur,cfg){

}
function dchips(id,cur){
  return [{v:'any',l:'Any'},{v:'easy',l:'Easy'},{v:'medium',l:'Med'},{v:'hard',l:'Hard'}].map(function(d){
    return '<div class="ch'+(d.v===cur?' on':'')+'" onclick="pickChip(\''+id+'\',\''+d.v+'\',\'diff\',this)">'+d.l+'</div>';
  }).join('');
}
function tchips(id,cur){
  return [{v:0,l:'None'},{v:10,l:'10s'},{v:20,l:'20s'},{v:30,l:'30s'}].map(function(t){
    return '<div class="ch'+(t.v===cur?' on':'')+'" onclick="pickChip(\''+id+'\','+t.v+',\'timer\',this)">'+t.l+'</div>';
  }).join('');
}
function pickChip(id,val,cfg,el){

// ── JOIN ──
function doJoin(){
  var code=(document.getElementById('joinCode').value||'').trim().toUpperCase().replace(/[^A-Z0-9]/g,'');
  var name=(document.getElementById('joinName').value||'').trim();
  if(!code||code.length<4){toast('Enter a room code');return;}
  if(!name){toast('Enter your display name');return;}
  myName=name.substring(0,20);
  localStorage.setItem('dqt_gname',myName);
  joinRoom(code);
}

function joinRoom(code){
  roomCode=code.toUpperCase().trim();
  spin('Finding room '+roomCode+'...');
  if(!sb){toast('Not connected — please refresh');showHome();return;}
  sb.from('dqtrivia_rooms').select('*').eq('id',roomCode).maybeSingle().then(function(res){
    if(res.error){toast('Error: '+res.error.message);showHome();return;}
    if(!res.data){toast('Room "'+roomCode+'" not found');showHome();return;}
    roomData=res.data;
    if(roomData.status==='ended'){toast('That game has already ended');showHome();return;}
    isHost=(roomData.host_id===myUserId);
    gCfg.cat=roomData.cat_id||0; gCfg.catName=roomData.cat_name||'All';
    gCfg.qcount=roomData.qcount||10; gCfg.diff=roomData.difficulty||'any'; gCfg.timer=roomData.timer||20;
    if(roomData.status==='playing'&&!isHost){
      toast('Game already started — joining now!');
      setTimeout(goPlay,600);
      return;
    }
    insertMe().then(showLobby);
  });
}

function insertMe(){
  if(!sb)return Promise.resolve();
  return sb.from('dqtrivia_room_players').select('id').eq('room_id',roomCode).eq('user_id',myUserId).maybeSingle()
    .then(function(res){
      if(res.data)return;
      return sb.from('dqtrivia_room_players').insert({
        room_id:roomCode,user_id:myUserId,display_name:myName,score:0,answers:[]
      }).then(function(r){if(r.error)console.error('insertMe:',r.error);});
    });
}

// ── CREATE ROOM ──
function createRoom(mode){
  if(!myUser){toast('Sign in to host');return;}
  var catSel=document.getElementById(mode==='tv'?'tvCat':'liveCat');
  if(!catSel){toast('Reload and try again');return;}
  gCfg.cat=parseInt(catSel.value); gCfg.catName=catSel.options[catSel.selectedIndex].text;
  roomCode=randCode(); isHost=true;
  spin('Creating room...');
  sb.from('dqtrivia_rooms').insert({
    id:roomCode,host_id:myUser.id,host_name:myName,status:'waiting',
    cat_id:gCfg.cat,cat_name:gCfg.catName,mode:mode,
    qcount:gCfg.qcount,difficulty:gCfg.diff,timer:gCfg.timer,
    question_index:0,questions:[]
  }).then(function(res){
    if(res.error){console.error('createRoom:',res.error);toast('Error: '+res.error.message);showHome();return;}
    sb.from('dqtrivia_room_players').insert({room_id:roomCode,user_id:myUserId,display_name:myName,score:0,answers:[]})
      .then(function(){showLobby();});
  });
}

// ── POLLING (primary sync — always runs) ──
function startPoll(){
  stopPoll();
  pollTmr=setInterval(function(){
    if(!sb||!roomCode)return;
    // Poll players list
    sb.from('dqtrivia_room_players').select('*').eq('room_id',roomCode)
      .order('joined_at',{ascending:true}).then(function(res){
        if(res.error)return;
        players=res.data||[];
        renderPlayers();
      });
    // Poll room status for non-hosts
    if(!isHost){
      sb.from('dqtrivia_rooms').select('status').eq('id',roomCode).maybeSingle().then(function(res){
        if(!res.data)return;
        if(res.data.status==='playing'){stopPoll();stopRT();toast('Game starting!');setTimeout(goPlay,400);}
        if(res.data.status==='ended'){stopPoll();stopRT();toast('Room ended');setTimeout(showHome,1200);}
      });
    }
  },2500);
}
function stopPoll(){if(pollTmr)clearInterval(pollTmr);pollTmr=null;}

// ── REALTIME (bonus layer on top of polling) ──
function startRT(){
  stopRT();
  if(!sb)return;
  try{
    rtCh=sb.channel('lby-'+roomCode+'-'+Date.now())
      .on('postgres_changes',{event:'*',schema:'public',table:'dqtrivia_room_players'},function(payload){
        var r=payload.new||payload.old||{};
        if(r.room_id!==roomCode)return;
        // Trigger an immediate poll instead of trusting payload
        if(sb)sb.from('dqtrivia_room_players').select('*').eq('room_id',roomCode)
          .order('joined_at',{ascending:true}).then(function(res){
            if(!res.error){players=res.data||[];renderPlayers();}
          });
      })
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'dqtrivia_rooms'},function(payload){
        if(!payload.new||payload.new.id!==roomCode)return;
        if(payload.new.status==='playing'&&!isHost){stopPoll();stopRT();toast('Game starting!');setTimeout(goPlay,400);}
        if(payload.new.status==='ended'){stopPoll();stopRT();toast('Room ended');setTimeout(showHome,1200);}
      })
      .subscribe(function(status){
        var dot=document.getElementById('syncDot');
        if(dot){
          if(status==='SUBSCRIBED')dot.classList.remove('dead');
          else if(status==='CHANNEL_ERROR'||status==='TIMED_OUT'||status==='CLOSED')dot.classList.add('dead');
        }
      });
  }catch(e){console.warn('RT setup failed:',e);}
}
function stopRT(){if(rtCh&&sb){try{sb.removeChannel(rtCh);}catch(e){}rtCh=null;}}

// ── LOAD + RENDER PLAYERS ──
function loadPlayers(){
  if(!sb)return;
  sb.from('dqtrivia_room_players').select('*').eq('room_id',roomCode)
    .order('joined_at',{ascending:true}).then(function(res){
      if(res.error)return;
      players=res.data||[];renderPlayers();
    });
}
function renderPlayers(){
  var list=document.getElementById('pList'),cnt=document.getElementById('ppCnt');
  if(!list)return;
  if(cnt)cnt.textContent=players.length;
  var badge=document.getElementById('sbadge'),stxt=document.getElementById('stxt');
  if(players.length>=2&&badge){badge.className='sbadge sg';if(stxt)stxt.textContent=players.length+' players ready';}
  else if(badge){badge.className='sbadge sw';if(stxt)stxt.textContent='Waiting for players';}
  if(!players.length){list.innerHTML='<div class="pempty">No players yet...</div>';return;}
  list.innerHTML='';
  var hostId=(roomData&&roomData.host_id)||'';
  players.forEach(function(p,i){
    var isMe=p.user_id===myUserId,isH=p.user_id===hostId;
    var col=COLORS[i%COLORS.length];
    var init=(p.display_name||'?').split(' ').map(function(w){return w[0]||'?';}).join('').toUpperCase().substr(0,2);
    var d=document.createElement('div');
    d.className='pr'+(isH?' ph':'')+(isMe?' pm':'');
    d.innerHTML='<div class="pav" style="background:'+col+';color:#0b0c10;">'+h(init)+'</div>'+
      '<span class="pnm">'+h(p.display_name)+'</span>'+
      (isH?'<span class="ptg ptg-h">👑 host</span>':'')+
      (isMe&&!isH?'<span class="ptg ptg-y">you</span>':'');
    list.appendChild(d);
  });
}

// ── START GAME ──
function startGame(){
  if(!isHost||!myUser)return;
  var btn=document.getElementById('startBtn');
  if(btn){btn.disabled=true;btn.textContent='Fetching questions...';}
  fetchQs().then(function(qs){
    if(!qs){toast('Could not load questions — check category');if(btn){btn.disabled=false;btn.textContent='Start Game';}return;}
    sb.from('dqtrivia_rooms').update({status:'playing',question_index:0,questions:qs}).eq('id',roomCode)
      .then(function(res){
        if(res.error){console.error('startGame:',res.error);toast('Error: '+res.error.message);if(btn){btn.disabled=false;btn.textContent='Start Game';}return;}
        stopPoll();stopRT();
        // TV mode → go to host.html; Live mode → go to play.html
        if(roomData&&roomData.mode==='tv'){window.location.href='host.html?room='+roomCode;}
        else{goPlay();}
      });
  });
}

// ── FETCH QUESTIONS ──
function fetchQs(){
  return getToken().then(function(tok){
    var url='https://opentdb.com/api.php?amount='+gCfg.qcount+'&encode=url3986';
    if(gCfg.cat&&gCfg.cat!==0)url+='&category='+gCfg.cat;
    if(gCfg.diff&&gCfg.diff!=='any')url+='&difficulty='+gCfg.diff;
    if(tok)url+='&token='+tok;
    return fetch(url).then(function(r){return r.json();}).then(function(d){
      if(d.response_code===5)return new Promise(function(ok){setTimeout(function(){fetchQs().then(ok);},5500);});
      if(d.response_code!==0||!d.results||!d.results.length)return null;
      return d.results.map(function(q){
        var dec=decodeURIComponent,ans=q.incorrect_answers.map(dec),cor=dec(q.correct_answer);
        ans.push(cor);
        for(var i=ans.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=ans[i];ans[i]=ans[j];ans[j]=t;}
        return{question:dec(q.question),correct:cor,answers:ans,difficulty:dec(q.difficulty),type:q.type};
      });
    }).catch(function(){return null;});
  });
}
function getToken(){
  var tok=localStorage.getItem('dqt_session_token');
  if(tok)return Promise.resolve(tok);
  return fetch('https://opentdb.com/api_token.php?command=request')
    .then(function(r){return r.json();})
    .then(function(d){if(d.token)localStorage.setItem('dqt_session_token',d.token);return d.token||'';})
    .catch(function(){return'';});
}

// ── NAVIGATION ──
function goPlay(){
  window.location.href='play.html?mode=live&room='+roomCode+'&cat='+gCfg.cat+'&catname='+encodeURIComponent(gCfg.catName)+'&skip=1';
}
function endRoom(){
  if(!isHost||!confirm('End room for all players?'))return;
  stopPoll();stopRT();
  sb.from('dqtrivia_rooms').update({status:'ended'}).eq('id',roomCode).then(function(){showHome();});
}

// ── HELPERS ──
function spin(msg){document.getElementById('mainContent').innerHTML='<div class="spinwrap"><div class="spinner"></div><div style="font-size:0.8rem;color:var(--muted);margin-top:8px;">'+(msg||'')+'</div></div>';}
function randCode(){return Math.random().toString(36).substr(2,6).toUpperCase();}
function h(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg){var t=document.getElementById('toast');if(!t)return;t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},3000);}
function toggleNav(){document.getElementById('navLinks').classList.toggle('open');}
window.addEventListener('beforeunload',function(){stopPoll();stopRT();});
</script>
