<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="../favicon.png">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TNYF9DN593"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-TNYF9DN593');
  </script>
  <script>(function(){var t=localStorage.getItem('dqt_theme')||'dark';if(t!=='dark')document.documentElement.setAttribute('data-theme',t);})();</script>
  <script src="../dq-auth.js" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <title>Lobby — DQtrivia</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--bg:#0b0c10;--bg2:#13141a;--bg3:#1a1b23;--border:rgba(255,255,255,0.08);--border-hi:rgba(255,255,255,0.15);--text:#f0f0f4;--muted:#7b7c8a;--accent:#4de888;--blue:#3a7fff;--gold:#f5c842;--red:#ff6b6b;--font-d:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;}
    [data-theme="ocean"]   {--bg:#040e1c;--bg2:#071629;--bg3:#0a1e38;--accent:#3ae8ff;--border:rgba(58,232,255,0.1);}
    [data-theme="forest"]  {--bg:#030e05;--bg2:#061809;--bg3:#09210d;--border:rgba(77,232,136,0.1);}
    [data-theme="sunset"]  {--bg:#12060a;--bg2:#1e0b10;--bg3:#2a1018;--accent:#ff8c5a;--blue:#ff5a8c;--border:rgba(255,140,90,0.1);}
    [data-theme="midnight"]{--bg:#05050f;--bg2:#09091e;--bg3:#0e0e2d;--accent:#a78bfa;--blue:#818cf8;--border:rgba(167,139,250,0.1);}
    [data-theme="candy"]   {--bg:#100514;--bg2:#1c0924;--bg3:#260e30;--accent:#f472b6;--blue:#c084fc;--border:rgba(244,114,182,0.1);}
    [data-theme="neon"]    {--bg:#020208;--bg2:#050510;--bg3:#080818;--accent:#39ff14;--blue:#00f5ff;--border:rgba(57,255,20,0.12);}
    [data-theme="metro"]   {--bg:#0d0d14;--bg2:#141420;--bg3:#1b1b2c;--accent:#60a5fa;--blue:#3b82f6;--border:rgba(96,165,250,0.1);}
    body{background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:15px;line-height:1.6;min-height:100vh;overflow-x:hidden;}
    .blob{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0;}
    .b1{width:500px;height:500px;background:rgba(58,127,255,0.06);top:-100px;right:-100px;}
    .b2{width:400px;height:400px;background:rgba(77,232,136,0.05);bottom:0;left:-80px;}
    nav{position:sticky;top:0;z-index:100;background:rgba(11,12,16,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;gap:12px;}
    .nav-logo{font-family:var(--font-d);font-weight:800;font-size:1.05rem;letter-spacing:-0.02em;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:8px;flex-shrink:0;}
    .nav-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);}
    .nav-links{display:flex;align-items:center;gap:2px;}
    .nav-links a{font-size:0.77rem;font-weight:500;color:var(--muted);text-decoration:none;padding:5px 9px;border-radius:6px;transition:color .15s,background .15s;white-space:nowrap;}
    .nav-links a:hover{color:var(--text);background:rgba(255,255,255,0.06);}
    .nav-links a.active{color:var(--accent);}
    .nav-hamburger{display:none;flex-direction:column;gap:4px;background:none;border:none;cursor:pointer;padding:6px;}
    .nav-hamburger span{display:block;width:18px;height:2px;background:var(--muted);border-radius:2px;}
    @media(max-width:640px){.nav-links{display:none;}.nav-links.open{display:flex;flex-direction:column;align-items:flex-start;position:fixed;top:56px;left:0;right:0;background:rgba(11,12,16,0.98);border-bottom:1px solid var(--border);padding:12px 20px 16px;gap:4px;z-index:99;}.nav-hamburger{display:flex;}}
    .nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0;}
    #dq-auth-btn{display:flex;align-items:center;gap:6px;background:rgba(14,19,32,0.8);border:1px solid #2a4468;border-radius:100px;padding:4px 10px 4px 5px;font-family:var(--font-b);font-size:.68rem;font-weight:500;color:#7a9abf;cursor:pointer;transition:all .18s;white-space:nowrap;flex-shrink:0;}
    #dq-auth-btn:hover{border-color:#3a7fff;color:#e8eef8;}
    #dq-auth-btn.logged-in{border-color:rgba(77,232,136,.35);color:#e8eef8;}
    #dq-auth-avatar{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#2dcc6f,#3a7fff);display:flex;align-items:center;justify-content:center;font-size:.75rem;overflow:hidden;flex-shrink:0;}
    #dq-auth-avatar img{width:100%;height:100%;object-fit:cover;}
    main{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:32px 20px 100px;}

    /* ENTRY */
    .entry-hero{text-align:center;margin-bottom:32px;animation:fadeUp .4s ease both;}
    .entry-eyebrow{font-size:0.68rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--blue);margin-bottom:8px;}
    .entry-title{font-family:var(--font-d);font-size:clamp(1.8rem,5vw,2.6rem);font-weight:800;letter-spacing:-0.03em;margin-bottom:8px;}
    .entry-sub{font-size:0.88rem;color:var(--muted);}
    .entry-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    @media(max-width:620px){.entry-grid{grid-template-columns:1fr;}}
    .entry-card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:22px;animation:fadeUp .4s ease both;}
    .entry-card:nth-child(2){animation-delay:.06s;}
    .ec-icon{font-size:1.6rem;margin-bottom:8px;}
    .ec-title{font-family:var(--font-d);font-size:1rem;font-weight:800;margin-bottom:4px;}
    .ec-sub{font-size:0.76rem;color:var(--muted);margin-bottom:14px;line-height:1.4;}
    .field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
    .field-label{font-size:0.67rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
    .field-input{background:var(--bg3);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:var(--font-b);font-size:0.88rem;padding:9px 12px;outline:none;transition:border-color .15s;width:100%;}
    .field-input:focus{border-color:var(--accent);}
    .field-input::placeholder{color:var(--muted);}
    select.field-input{cursor:pointer;}
    .chip-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px;}
    .chip{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:4px 11px;font-size:0.74rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;user-select:none;}
    .chip:hover{border-color:var(--border-hi);color:var(--text);}
    .chip.active{background:rgba(77,232,136,0.1);border-color:rgba(77,232,136,0.4);color:var(--accent);}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border-radius:10px;font-family:var(--font-b);font-size:0.85rem;font-weight:700;cursor:pointer;transition:all .15s;border:none;padding:11px 18px;width:100%;margin-top:6px;}
    .btn:active{transform:scale(0.97);}
    .btn:disabled{opacity:0.45;cursor:not-allowed;transform:none;}
    .btn-g{background:var(--accent);color:#071209;}
    .btn-g:hover:not(:disabled){filter:brightness(1.1);}
    .btn-b{background:var(--blue);color:#fff;}
    .btn-b:hover:not(:disabled){filter:brightness(1.1);}
    .btn-gh{background:rgba(255,255,255,0.05);color:var(--text);border:1px solid var(--border);}
    .btn-gh:hover:not(:disabled){background:rgba(255,255,255,0.09);}
    .btn-red{background:var(--red);color:#fff;}
    .btn-red:hover:not(:disabled){filter:brightness(1.1);}

    /* LOBBY */
    .lobby-layout{display:grid;grid-template-columns:1fr 270px;gap:16px;align-items:start;}
    @media(max-width:720px){.lobby-layout{grid-template-columns:1fr;}}
    .lobby-main{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:22px;animation:fadeUp .3s ease both;}
    .lobby-code-wrap{text-align:center;padding:14px 0 20px;border-bottom:1px solid var(--border);margin-bottom:18px;}
    .lobby-code-label{font-size:0.63rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
    .lobby-code-big{font-family:var(--font-d);font-size:clamp(2rem,7vw,3.2rem);font-weight:800;letter-spacing:.3em;color:var(--accent);line-height:1;cursor:pointer;transition:opacity .15s;}
    .lobby-code-big:hover{opacity:0.75;}
    .lobby-code-hint{font-size:0.68rem;color:var(--muted);margin-top:7px;}
    .lobby-code-hint span{color:var(--blue);}
    .lobby-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
    .meta-pill{background:var(--bg3);border:1px solid var(--border);border-radius:100px;padding:3px 10px;font-size:0.68rem;color:var(--muted);}
    .meta-pill strong{color:var(--text);}
    .status-badge{display:inline-flex;align-items:center;gap:6px;border-radius:100px;padding:4px 12px;font-size:0.68rem;font-weight:600;margin-bottom:14px;}
    .status-badge .dot{width:5px;height:5px;border-radius:50%;}
    .s-waiting{background:rgba(245,200,66,0.08);color:var(--gold);border:1px solid rgba(245,200,66,0.2);}
    .s-waiting .dot{background:var(--gold);animation:blink 1s infinite;}
    .s-ready{background:rgba(77,232,136,0.08);color:var(--accent);border:1px solid rgba(77,232,136,0.2);}
    .s-ready .dot{background:var(--accent);}
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.25;}}
    .host-controls{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
    .host-controls-label{font-size:0.63rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
    .host-btns{display:flex;gap:7px;flex-wrap:wrap;}
    .host-btns .btn{width:auto;flex:1;margin-top:0;padding:9px 14px;font-size:0.8rem;}

    /* PLAYER PANEL */
    .player-panel{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:16px;animation:fadeUp .3s ease .06s both;}
    .panel-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
    .panel-title{font-family:var(--font-d);font-size:0.85rem;font-weight:700;}
    .player-count-badge{background:var(--accent);color:#071209;border-radius:100px;padding:2px 8px;font-size:0.66rem;font-weight:800;}
    .player-list{display:flex;flex-direction:column;gap:5px;}
    .player-row{display:flex;align-items:center;gap:9px;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:7px 11px;animation:fadeUp .2s ease both;}
    .player-row.is-host{border-color:rgba(245,200,66,0.25);background:rgba(245,200,66,0.03);}
    .player-row.is-me{border-color:rgba(77,232,136,0.2);}
    .player-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.68rem;font-weight:700;flex-shrink:0;}
    .player-name{font-size:0.8rem;font-weight:500;flex:1;color:var(--text);}
    .player-tag{font-size:0.58rem;border-radius:100px;padding:2px 6px;border:1px solid;flex-shrink:0;}
    .tag-host{color:var(--gold);border-color:rgba(245,200,66,0.3);}
    .tag-you{color:var(--accent);border-color:rgba(77,232,136,0.3);}
    .player-empty{text-align:center;padding:18px;color:var(--muted);font-size:0.76rem;}

    /* WARMUP */
    .warmup-wrap{margin-top:14px;border-top:1px solid var(--border);padding-top:14px;}
    .warmup-label{font-size:0.63rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
    .warmup-q{font-size:0.8rem;font-weight:600;margin-bottom:7px;line-height:1.4;color:var(--text);}
    .warmup-opts{display:flex;flex-direction:column;gap:4px;}
    .warmup-btn{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:6px 11px;font-size:0.74rem;color:var(--text);cursor:pointer;text-align:left;transition:all .15s;font-family:var(--font-b);}
    .warmup-btn:hover:not(:disabled){border-color:var(--border-hi);}
    .warmup-btn.correct{background:rgba(77,232,136,0.12);border-color:rgba(77,232,136,0.4);color:var(--accent);}
    .warmup-btn.wrong{background:rgba(255,107,107,0.08);border-color:rgba(255,107,107,0.3);color:var(--red);}
    .warmup-btn.reveal{background:rgba(77,232,136,0.05);border-color:rgba(77,232,136,0.15);color:var(--muted);}
    .warmup-score{font-size:0.68rem;color:var(--muted);margin-top:6px;text-align:right;}

    /* CONNECTING */
    .connecting{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:14px;text-align:center;}
    .spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8px 18px;font-size:0.8rem;color:var(--text);opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:300;white-space:nowrap;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

    .dq-watermark{position:fixed;bottom:8px;left:12px;font-family:var(--font-d);font-size:.57rem;font-weight:600;letter-spacing:.1em;color:#1a5c36;text-transform:uppercase;pointer-events:none;z-index:998;}
    .fab2-wrap{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;align-items:flex-end;gap:8px;z-index:999;}
    .fab2-toggle{width:34px;height:34px;border-radius:50%;background:#28a45a;border:none;color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(40,164,90,0.4);transition:transform .18s,background .18s;}
    .fab2-toggle.open{transform:rotate(45deg);background:#1f8a48;}
    .fab2-items{display:flex;flex-direction:column;align-items:flex-end;gap:7px;overflow:hidden;max-height:0;opacity:0;transition:max-height .32s ease,opacity .25s ease;}
    .fab2-items.open{max-height:400px;opacity:1;}
    .fab2-item{display:flex;align-items:center;position:relative;}
    .fab2-label{background:#18181f;color:#c8f0d8;font-size:.62rem;font-weight:700;padding:4px 8px;border-radius:6px;white-space:nowrap;border:1px solid #2e2e42;opacity:0;transform:translateX(6px);transition:opacity .15s,transform .15s;pointer-events:none;margin-right:7px;}
    .fab2-item:hover .fab2-label{opacity:1;transform:translateX(0);}
    .fab2-icon{width:30px;height:30px;border-radius:50%;background:#28a45a;color:#fff;display:flex;align-items:center;justify-content:center;font-size:.78rem;text-decoration:none;transition:background .15s,transform .15s;}
    .fab2-icon:hover{background:#1f8a48;transform:scale(1.12);}
  </style>
</head>
<body>
<div class="blob b1"></div><div class="blob b2"></div>
<div class="toast" id="toast"></div>

<nav>
  <a class="nav-logo" href="index.html"><div class="nav-dot"></div>DQtrivia</a>
  <button class="nav-hamburger" id="hamburger" onclick="toggleNav()"><span></span><span></span><span></span></button>
  <div class="nav-links" id="navLinks">
    <a href="index.html">Home</a>
    <a href="categories.html">Categories</a>
    <a href="play.html">Play</a>
    <a href="stats.html">Stats</a>
    <a href="history.html">History</a>
    <a href="shop.html">🛒 Shop</a>
    <a href="settings.html">⚙️</a>
    <a href="lobby.html" class="active" style="background:var(--blue);color:#fff;border-radius:7px;padding:5px 10px;font-weight:700;font-size:0.75rem;">Join Game</a>
  </div>
  <div class="nav-right">
    <span id="navBadge" style="font-size:0.95rem;flex-shrink:0;"></span>
    <button id="dq-auth-btn" onclick="(function(e){e.stopPropagation();if(typeof DQAuth!=='undefined')DQAuth._toggleDropdown();})(event)">
      <div id="dq-auth-avatar">👤</div><span id="dq-auth-label">Sign In</span>
    </button>
  </div>
</nav>

<main id="mainContent">
  <div class="connecting"><div class="spinner"></div><div style="font-size:0.85rem;color:var(--muted);">Connecting…</div></div>
</main>

<div class="dq-watermark">© 2026 DQtools by E. S.</div>
<div class="fab2-wrap">
  <div class="fab2-items" id="fab2menu">
    <div class="fab2-item"><span class="fab2-label">Settings</span><a class="fab2-icon" href="settings.html">⚙️</a></div>
    <div class="fab2-item"><span class="fab2-label">Shop</span><a class="fab2-icon" href="shop.html">🛒</a></div>
    <div class="fab2-item"><span class="fab2-label">Stats</span><a class="fab2-icon" href="stats.html">📊</a></div>
    <div class="fab2-item"><span class="fab2-label">Account</span><a class="fab2-icon" href="account.html">👤</a></div>
    <div class="fab2-item"><span class="fab2-label">DQtools Home</span><a class="fab2-icon" href="../index.html">🏠</a></div>
  </div>
  <button class="fab2-toggle" id="fab2btn" onclick="(function(){var m=document.getElementById('fab2menu'),b=document.getElementById('fab2btn');m.classList.toggle('open');b.classList.toggle('open');b.textContent=b.classList.contains('open')?'✕':'☰';})()">☰</button>
</div>
<script>
var BADGE_EMOJIS={rookie:'🥉',scholar:'📖',champion:'🏆',legend:'🐉',ghost:'👻',wizard:'🧙'};
var COLORS=['#4de888','#3a7fff','#f5c842','#ff8c5a','#a78bfa','#f472b6','#3ae8ff','#39ff14'];
var CAT_NAMES={0:'All Categories',9:'General Knowledge',10:'Books',11:'Film',12:'Music',13:'Musicals & Theatre',14:'Television',15:'Video Games',16:'Board Games',17:'Science & Nature',18:'Computers',19:'Mathematics',20:'Mythology',21:'Sports',22:'Geography',23:'History',24:'Politics',25:'Art',26:'Celebrities',27:'Animals',28:'Vehicles',29:'Comics',30:'Gadgets',31:'Anime & Manga',32:'Cartoons & Animation'};

var WARMUP_QS=[
  {q:'What is the capital of France?',a:'Paris',opts:['London','Paris','Berlin','Madrid']},
  {q:'How many sides does a hexagon have?',a:'6',opts:['5','6','7','8']},
  {q:'What planet is closest to the Sun?',a:'Mercury',opts:['Venus','Earth','Mars','Mercury']},
  {q:'Who wrote Romeo and Juliet?',a:'Shakespeare',opts:['Dickens','Shakespeare','Austen','Poe']},
  {q:'What is 12 x 12?',a:'144',opts:['124','132','144','148']},
  {q:'What is the chemical symbol for gold?',a:'Au',opts:['Go','Gd','Au','Ag']},
  {q:'Which ocean is the largest?',a:'Pacific',opts:['Atlantic','Indian','Pacific','Arctic']},
  {q:'How many strings does a standard guitar have?',a:'6',opts:['4','5','6','7']},
  {q:'What year did WW2 end?',a:'1945',opts:['1943','1944','1945','1946']},
  {q:'What is the hardest natural substance?',a:'Diamond',opts:['Quartz','Titanium','Diamond','Obsidian']}
];

// ── STATE ──
var sb=null, currentUser=null, playerStats={}, myDisplayName='Guest', myUserId='';
var roomCode='', isHost=false, roomChannel=null, roomData=null, playerRows=[];
var warmupIdx=0, warmupScore=0;
var gameConfig={cat:0,catName:'All Categories',qcount:10,diff:'any',timer:20};
var urlParams=new URLSearchParams(window.location.search);
var paramCode=(urlParams.get('code')||urlParams.get('room')||'').toUpperCase().trim();

// ── AUTH ──
window.addEventListener('dq:authready',function(e){
  var user=e.detail&&e.detail.user;
  sb=DQAuth.getSupabase();
  if(user){
    currentUser=user;
    myUserId=user.id;
    DQAuth.loadData('dqtrivia_stats').then(function(saved){
      playerStats=saved||{};
      var eq=playerStats.equippedItems||{};
      if(eq.theme){localStorage.setItem('dqt_theme',eq.theme);document.documentElement.setAttribute('data-theme',eq.theme);}
      var nb=document.getElementById('navBadge');
      if(nb)nb.textContent=BADGE_EMOJIS[eq.badge||'rookie']||'';
      var profile=DQAuth.getProfile();
      myDisplayName=((profile&&profile.displayName)||user.email.split('@')[0]||'Player').substring(0,20);
      gameConfig.qcount=parseInt(localStorage.getItem('dqt_qcount')||'10');
      gameConfig.diff=localStorage.getItem('dqt_difficulty')||'any';
      gameConfig.timer=parseInt(localStorage.getItem('dqt_timer')||'20');
      init();
    });
  } else {
    // Guest — can join but not host
    var gid=localStorage.getItem('dqt_guest_id');
    if(!gid){gid='g_'+Date.now().toString(36);localStorage.setItem('dqt_guest_id',gid);}
    myUserId=gid;
    myDisplayName=localStorage.getItem('dqt_guest_name')||'Guest';
    init();
  }
});

function init(){
  if(paramCode){joinRoom(paramCode);}
  else{showEntryScreen();}
}

function hostChip(type,val,el){
  el.parentNode.querySelectorAll('.chip').forEach(function(c){c.classList.remove('active');});
  el.classList.add('active');
  gameConfig[type]=val;
}

// ── WARMUP ──
function renderWarmup(){
  var area=document.getElementById('warmupArea');
  if(!area)return;
  var q=WARMUP_QS[warmupIdx%WARMUP_QS.length];
  area.innerHTML=
    '<div class="warmup-q">'+escHtml(q.q)+'</div>'+
    '<div class="warmup-opts">'+
      q.opts.map(function(o){
        return '<button class="warmup-btn" onclick="answerWarmup(this,\''+escHtml(o)+'\',\''+escHtml(q.a)+'\')">'+escHtml(o)+'</button>';
      }).join('')+
    '</div>';
}
function answerWarmup(btn,chosen,correct){
  btn.parentNode.querySelectorAll('.warmup-btn').forEach(function(b){b.disabled=true;});
  if(chosen===correct){btn.classList.add('correct');warmupScore++;}
  else{btn.classList.add('wrong');btn.parentNode.querySelectorAll('.warmup-btn').forEach(function(b){if(b.textContent===correct)b.classList.add('reveal');});}
  var sc=document.getElementById('warmupScore');
  if(sc)sc.textContent=warmupScore+' correct so far';
  warmupIdx++;
  setTimeout(renderWarmup,1300);
}

// ═══════════════════════════════════════════
// CREATE ROOM
// ═══════════════════════════════════════════
function createRoom(){
  if(!currentUser){showToast('Sign in to host');return;}
  var btn=document.getElementById('createBtn');
  if(btn){btn.disabled=true;btn.textContent='Creating room...';}
  var catSel=document.getElementById('hostCat');
  if(catSel){gameConfig.cat=parseInt(catSel.value);gameConfig.catName=catSel.options[catSel.selectedIndex].text;}
  roomCode=randomCode();
  isHost=true;
  sb.from('dqtrivia_rooms').insert({
    id:roomCode,host_id:currentUser.id,host_name:myDisplayName,
    status:'waiting',cat_id:gameConfig.cat,cat_name:gameConfig.catName,
    mode:'live',qcount:gameConfig.qcount,difficulty:gameConfig.diff,
    timer:gameConfig.timer,question_index:0,questions:[]
  }).then(function(res){
    if(res.error){
      console.error('Create room error:',res.error);
      showToast('Error: '+res.error.message);
      if(btn){btn.disabled=false;btn.textContent='Create Room & Get Code';}
      return;
    }
    // Add host as first player
    sb.from('dqtrivia_room_players').insert({
      room_id:roomCode,user_id:myUserId,display_name:myDisplayName,score:0,answers:[]
    }).then(function(r2){
      if(r2.error)console.warn('Host player insert:',r2.error);
      showLobbyScreen();
    });
  });
}

// ═══════════════════════════════════════════
// JOIN ROOM
// ═══════════════════════════════════════════
function joinFromInput(){
  var code=(document.getElementById('joinCodeInput').value||'').trim().toUpperCase();
  var name=(document.getElementById('joinNameInput').value||'').trim();
  if(!code||code.length<4){showToast('Enter a valid room code');return;}
  if(!name){showToast('Enter your display name');return;}
  myDisplayName=name.substring(0,20);
  if(!currentUser)localStorage.setItem('dqt_guest_name',myDisplayName);
  joinRoom(code);
}

function joinRoom(code){
  roomCode=code.toUpperCase().trim();
  showConnecting('Finding room '+roomCode+'...');
  sb.from('dqtrivia_rooms').select('*').eq('id',roomCode).maybeSingle().then(function(res){
    if(res.error){
      console.error('Join room error:',res.error);
      showToast('Database error — try again');
      showEntryScreen();
      return;
    }
    if(!res.data){
      showToast('Room "'+roomCode+'" not found');
      showEntryScreen();
      return;
    }
    roomData=res.data;
    if(roomData.status==='ended'){showToast('This game has already ended');showEntryScreen();return;}
    isHost=(roomData.host_id===myUserId);
    gameConfig.cat=roomData.cat_id||0;
    gameConfig.catName=roomData.cat_name||'All Categories';
    gameConfig.qcount=roomData.qcount||10;
    gameConfig.diff=roomData.difficulty||'any';
    gameConfig.timer=roomData.timer||20;
    // If game already in progress, go straight to play
    if(roomData.status==='playing'&&!isHost){
      showToast('Game in progress — joining now!');
      setTimeout(function(){
        window.location.href='play.html?mode=live&room='+roomCode+'&cat='+gameConfig.cat+'&catname='+encodeURIComponent(gameConfig.catName)+'&skip=1';
      },600);
      return;
    }
    insertMeAsPlayer().then(function(){showLobbyScreen();});
  });
}

function insertMeAsPlayer(){
  // Check if already in (handles page refresh)
  return sb.from('dqtrivia_room_players').select('id').eq('room_id',roomCode).eq('user_id',myUserId).maybeSingle()
    .then(function(res){
      if(res.data){return;} // already joined
      return sb.from('dqtrivia_room_players').insert({
        room_id:roomCode,user_id:myUserId,display_name:myDisplayName,score:0,answers:[]
      }).then(function(r){
        if(r.error)console.error('Insert player error:',r.error);
      });
    });
}

// ═══════════════════════════════════════════
// LOBBY SCREEN
// ═══════════════════════════════════════════
function showLobbyScreen(){
  var diffLabel={any:'Any difficulty',easy:'Easy',medium:'Medium',hard:'Hard'}[gameConfig.diff]||gameConfig.diff;
  var timerLabel=gameConfig.timer===0?'No timer':gameConfig.timer+'s per question';

  var hostSection=isHost
    ? '<div class="host-controls">'+
        '<div class="host-controls-label">You are the host</div>'+
        '<div style="font-size:0.74rem;color:var(--muted);margin-bottom:10px;">When everyone has joined, click Start. You\'ll get the <strong style="color:var(--text)">TV presenter screen</strong> — players answer on their own devices.</div>'+
        '<div class="host-btns">'+
          '<button class="btn btn-g" onclick="startGame()" id="startBtn">▶ Start Game</button>'+
          '<button class="btn btn-red" onclick="endRoom()">✕ End Room</button>'+
        '</div>'+
      '</div>'
    : '<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);text-align:center;">'+
        '<div style="font-size:0.78rem;color:var(--muted);margin-bottom:6px;">Waiting for the host to start...</div>'+
        '<div style="font-size:0.72rem;color:var(--muted);">When the game starts you\'ll automatically be taken to the question screen.</div>'+
      '</div>';

  document.getElementById('mainContent').innerHTML=
    '<div class="lobby-layout">'+
    '<div class="lobby-main">'+
      '<div class="lobby-code-wrap">'+
        '<div class="lobby-code-label">Room code — share this with players</div>'+
        '<div class="lobby-code-big" onclick="copyCode()" title="Click to copy">'+roomCode+'</div>'+
        '<div class="lobby-code-hint">Players go to lobby.html and enter code <span>'+roomCode+'</span> · click to copy</div>'+
      '</div>'+
      '<div class="lobby-meta">'+
        '<div class="meta-pill">📚 <strong>'+escHtml(gameConfig.catName)+'</strong></div>'+
        '<div class="meta-pill">❓ <strong>'+gameConfig.qcount+'</strong> Qs</div>'+
        '<div class="meta-pill">⚡ <strong>'+escHtml(diffLabel)+'</strong></div>'+
        '<div class="meta-pill">⏱ <strong>'+escHtml(timerLabel)+'</strong></div>'+
      '</div>'+
      '<div class="status-badge s-waiting" id="lobbyStatus"><span class="dot"></span><span id="lobbyStatusText">Waiting for players to join</span></div>'+
      hostSection+
      '<div class="warmup-wrap">'+
        '<div class="warmup-label">Warm-up trivia while you wait</div>'+
        '<div id="warmupArea"></div>'+
        '<div class="warmup-score" id="warmupScore"></div>'+
      '</div>'+
    '</div>'+
    '<div class="player-panel">'+
      '<div class="panel-hd"><div class="panel-title">Players in room</div><div class="player-count-badge" id="playerCountBadge">0</div></div>'+
      '<div class="player-list" id="playerList"><div class="player-empty">No players yet...</div></div>'+
    '</div>'+
    '</div>';

  try{var u=new URL(window.location);u.searchParams.set('code',roomCode);window.history.replaceState({},'',u);}catch(e){}
  renderWarmup();
  loadPlayers();
  subscribeToRoom();
}

// ── LOAD PLAYERS ──
function loadPlayers(){
  sb.from('dqtrivia_room_players').select('*').eq('room_id',roomCode)
    .order('joined_at',{ascending:true}).then(function(res){
      if(res.error){console.error('Load players:',res.error);return;}
      playerRows=res.data||[];
      renderPlayerList();
    });
}

// ── REALTIME — no filter strings (client-side filter instead) ──
function subscribeToRoom(){
  if(roomChannel){try{sb.removeChannel(roomChannel);}catch(e){}}
  roomChannel=sb.channel('lobby-'+roomCode)
    .on('postgres_changes',{event:'*',schema:'public',table:'dqtrivia_room_players'},function(payload){
      var row=payload.new||payload.old||{};
      if((row.room_id||'')!==roomCode)return;
      if(payload.eventType==='INSERT'){
        if(!playerRows.some(function(p){return p.id===row.id;})){
          playerRows.push(payload.new);
          renderPlayerList();
          if(payload.new.user_id!==myUserId)showToast('👋 '+escHtml(payload.new.display_name)+' joined!');
        }
      }
      if(payload.eventType==='UPDATE'){
        playerRows=playerRows.map(function(p){return p.id===payload.new.id?payload.new:p;});
        renderPlayerList();
      }
      if(payload.eventType==='DELETE'){
        playerRows=playerRows.filter(function(p){return p.id!==payload.old.id;});
        renderPlayerList();
      }
    })
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'dqtrivia_rooms'},function(payload){
      if((payload.new.id||'')!==roomCode)return;
      roomData=payload.new;
      if(payload.new.status==='playing'&&!isHost){
        showToast('Game starting!');
        setTimeout(function(){
          window.location.href='play.html?mode=live&room='+roomCode+'&cat='+gameConfig.cat+'&catname='+encodeURIComponent(gameConfig.catName)+'&skip=1';
        },500);
      }
      if(payload.new.status==='ended'){
        showToast('Host ended the room');
        try{sb.removeChannel(roomChannel);}catch(e){}
        setTimeout(showEntryScreen,1500);
      }
    })
    .subscribe(function(status,err){
      if(status==='CHANNEL_ERROR')console.error('Realtime error:',err);
    });
}

// ── RENDER PLAYERS ──
function renderPlayerList(){
  var list=document.getElementById('playerList');
  var badge=document.getElementById('playerCountBadge');
  if(!list)return;
  if(badge)badge.textContent=playerRows.length;
  var sb2=document.getElementById('lobbyStatus');
  var st=document.getElementById('lobbyStatusText');
  if(playerRows.length>=2&&sb2){
    sb2.className='status-badge s-ready';
    if(st)st.textContent=playerRows.length+' players ready';
  } else if(sb2){
    sb2.className='status-badge s-waiting';
    if(st)st.textContent='Waiting for players to join';
  }
  if(playerRows.length===0){list.innerHTML='<div class="player-empty">No players yet...</div>';return;}
  list.innerHTML='';
  var hostId=(roomData&&roomData.host_id)||'';
  playerRows.forEach(function(p,i){
    var isMe=p.user_id===myUserId;
    var isH=p.user_id===hostId;
    var color=COLORS[i%COLORS.length];
    var init=(p.display_name||'?').split(' ').map(function(w){return w[0]||'?';}).join('').toUpperCase().substr(0,2);
    var div=document.createElement('div');
    div.className='player-row'+(isH?' is-host':'')+(isMe?' is-me':'');
    div.innerHTML='<div class="player-avatar" style="background:'+color+';color:#0b0c10;">'+escHtml(init)+'</div>'+
      '<span class="player-name">'+escHtml(p.display_name)+'</span>'+
      (isH?'<span class="player-tag tag-host">👑 Host</span>':'')+
      (isMe&&!isH?'<span class="player-tag tag-you">you</span>':'');
    list.appendChild(div);
  });
}

function copyCode(){
  navigator.clipboard.writeText(roomCode).then(function(){showToast('Copied: '+roomCode);}).catch(function(){showToast('Code: '+roomCode);});
}

// ═══════════════════════════════════════════
// START GAME (host only)
// ═══════════════════════════════════════════
function startGame(){
  if(!isHost||!currentUser)return;
  var btn=document.getElementById('startBtn');
  if(btn){btn.disabled=true;btn.textContent='Fetching questions...';}
  fetchQuestionsForRoom().then(function(qs){
    if(!qs||qs.length===0){
      showToast('Could not load questions — check category/difficulty');
      if(btn){btn.disabled=false;btn.textContent='Start Game';}
      return;
    }
    sb.from('dqtrivia_rooms')
      .update({status:'playing',question_index:0,questions:qs})
      .eq('id',roomCode)
      .then(function(res){
        if(res.error){
          console.error('Start game update error:',res.error);
          showToast('Error starting game: '+res.error.message);
          if(btn){btn.disabled=false;btn.textContent='Start Game';}
          return;
        }
        // Redirect host to TV/presenter screen
        window.location.href='host.html?room='+roomCode;
      });
  }).catch(function(err){
    console.error('fetchQuestionsForRoom error:',err);
    showToast('Network error — try again');
    if(btn){btn.disabled=false;btn.textContent='Start Game';}
  });
}

// ── FETCH QUESTIONS ──
function fetchQuestionsForRoom(){
  return getOrCreateToken().then(function(token){
    var url='https://opentdb.com/api.php?amount='+gameConfig.qcount+'&encode=url3986';
    if(gameConfig.cat&&gameConfig.cat!==0)url+='&category='+gameConfig.cat;
    if(gameConfig.diff&&gameConfig.diff!=='any')url+='&difficulty='+gameConfig.diff;
    if(token)url+='&token='+token;
    return fetch(url).then(function(r){return r.json();}).then(function(d){
      if(d.response_code===5){return new Promise(function(res){setTimeout(function(){fetchQuestionsForRoom().then(res);},5500);});}
      if(d.response_code!==0||!d.results||!d.results.length)return null;
      return d.results.map(function(q){
        var dec=decodeURIComponent;
        var answers=q.incorrect_answers.map(dec);
        var correct=dec(q.correct_answer);
        answers.push(correct);
        for(var i=answers.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=answers[i];answers[i]=answers[j];answers[j]=t;}
        return{question:dec(q.question),correct:correct,answers:answers,difficulty:dec(q.difficulty),type:q.type};
      });
    });
  });
}

function getOrCreateToken(){
  var tok=localStorage.getItem('dqt_session_token');
  if(tok)return Promise.resolve(tok);
  return fetch('https://opentdb.com/api_token.php?command=request')
    .then(function(r){return r.json();})
    .then(function(d){if(d.token)localStorage.setItem('dqt_session_token',d.token);return d.token||'';})
    .catch(function(){return'';});
}

// ── END ROOM ──
function endRoom(){
  if(!isHost)return;
  if(!confirm('End the room for everyone?'))return;
  sb.from('dqtrivia_rooms').update({status:'ended'}).eq('id',roomCode).then(function(){
    try{sb.removeChannel(roomChannel);}catch(e){}
    showEntryScreen();
  });
}

// ── HELPERS ──
function showConnecting(msg){
  document.getElementById('mainContent').innerHTML=
    '<div class="connecting"><div class="spinner"></div><div style="font-size:0.85rem;color:var(--muted);">'+(msg||'Connecting...')+'</div></div>';
}
function randomCode(){return Math.random().toString(36).substr(2,6).toUpperCase();}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(msg){var t=document.getElementById('toast');if(!t)return;t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},3000);}
function toggleNav(){document.getElementById('navLinks').classList.toggle('open');}
